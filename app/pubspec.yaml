name: myspot
description: MySpot — business networking, entrepreneurship & motivation platform.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  cloud_functions: ^5.1.5
  firebase_storage: ^12.3.7
  firebase_app_check: ^0.3.2
  firebase_database: ^11.1.4

  # Auth providers
  google_sign_in: ^6.2.2
  # sign_in_with_apple: ^6.1.4   # add when wiring Apple sign-in (see docs/06)

  # Notifications
  firebase_messaging: ^15.1.6

  # Media & feed (P1)
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  share_plus: ^10.1.2

  # Open hosted checkout URLs (P2)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
