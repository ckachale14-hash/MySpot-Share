name: myspot
description: MySpot — business networking, entrepreneurship & motivation platform.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  cloud_functions: ^5.1.5
  firebase_storage: ^12.3.7
  firebase_app_check: ^0.3.2
  firebase_database: ^11.1.4

  # Observability — analytics works on web; Crashlytics/Performance are
  # mobile-only and are guarded by kIsWeb in core/observability.
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_performance: ^0.10.0

  # Auth providers
  google_sign_in: ^6.2.2
  # sign_in_with_apple: ^6.1.4   # add when wiring Apple sign-in (see docs/06)

  # Notifications
  firebase_messaging: ^15.1.6

  # Media & feed (P1)
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  share_plus: ^10.1.2

  # Open hosted checkout URLs (P2)
  url_launcher: ^6.3.1

  # Live streaming (P3) — native; web uses a placeholder via conditional import
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # In-app purchases (mobile premium) — native; web uses a stub via conditional import
  purchases_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icons + web favicon, generated from the brand symbol.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  web:
    generated: true
    image_path: "assets/branding/app_icon_maskable.png"
    background_color: "#FFFFFF"
    theme_color: "#0052B4"

flutter:
  uses-material-design: true
